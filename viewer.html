<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer - Flipper Zero Teacher</title>
    <link rel="stylesheet" href="./assets/css/site.css">
</head>
<body class="reader-page" data-site-root="./" data-kicker="Markdown Viewer" data-mode-label="Markdown · Runtime Render">
    <div class="reader-shell">
        <header class="site-topbar">
            <a class="site-brand" href="./index.html">
                <span class="site-brand-mark">FZ</span>
                <span class="site-brand-text">
                    <strong>Flipper Zero Teacher</strong>
                    <span>GitHub Pages · Markdown 单源阅读</span>
                </span>
            </a>
            <nav class="site-nav">
                <a href="./index.html">首页</a>
                <a href="./CN/Guide/index.html">中文课程</a>
                <a href="./viewer.html?file=CN/FlipperZero-Master-CN.md">主知识库</a>
                <a href="./viewer.html?file=CN/qFlipper-全网融合总文档.md">qFlipper 专题</a>
            </nav>
        </header>

        <main class="reader-main">
            <section class="doc-hero">
                <div>
                    <p class="eyebrow" id="docEyebrow">Markdown Viewer</p>
                    <h1 class="doc-title" id="docTitle">正在载入文档…</h1>
                    <p class="doc-lead" id="docLead">课程外的 Markdown 文档会统一走这个阅读器，不再直接把原始 Markdown 甩给用户。</p>
                </div>
                <div class="doc-meta">
                    <div class="doc-meta-card">
                        <dl>
                            <div>
                                <dt>Source</dt>
                                <dd id="docPath">等待路径参数</dd>
                            </div>
                            <div>
                                <dt>Mode</dt>
                                <dd id="docMode">Markdown · Runtime Render</dd>
                            </div>
                        </dl>
                        <a class="source-link" id="sourceLink" href="./index.html">查看源 Markdown</a>
                    </div>
                </div>
            </section>

            <div class="reader-grid">
                <article class="doc-panel markdown-body" id="docContent">
                    <p class="empty-state">正在读取 Markdown 内容…</p>
                </article>

                <aside class="toc-panel">
                    <h2 class="toc-title">本页目录</h2>
                    <nav id="docToc">
                        <p class="empty-state">文档渲染后会在这里生成章节目录。</p>
                    </nav>
                </aside>
            </div>

            <nav class="pager" id="docPager"></nav>
        </main>
    </div>

    <script src="./assets/js/guide-manifest.js"></script>
    <script src="./assets/vendor/marked.min.js"></script>
    <script src="./assets/js/reader.js"></script>
</body>
</html>
