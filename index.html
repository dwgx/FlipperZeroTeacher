<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipper Zero 教学知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 28px;
            }
        }

        a.card {
            display: block;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        a.card:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .card-icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: block;
        }

        .card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        .cta-section {
            text-align: center;
            margin-top: 48px;
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 14px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .badge {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="badges">
                <span class="badge">双语教学</span>
                <span class="badge">官方文档</span>
                <span class="badge">AI 友好</span>
            </div>

            <h1>Flipper Zero <span>教学知识库</span></h1>
            <p class="subtitle">系统学习 Flipper Zero 的完整资源</p>

            <div class="grid">
                <a href="CN/Guide/README.md" class="card">
                    <span class="card-icon">📚</span>
                    <h3>中文教学导航</h3>
                    <p>按课程顺序系统学习</p>
                </a>

                <a href="CN/FlipperZero-Master-CN.md" class="card">
                    <span class="card-icon">📖</span>
                    <h3>中文主知识库</h3>
                    <p>建立全局视角与认知框架</p>
                </a>

                <a href="CN/FlipperZero-AI-Pack-CN.md" class="card">
                    <span class="card-icon">🤖</span>
                    <h3>中文 AI 规则包</h3>
                    <p>RAG / 检索 / 自动化问答</p>
                </a>

                <a href="EN/README.md" class="card">
                    <span class="card-icon">🌐</span>
                    <h3>English Entry</h3>
                    <p>English Learning Resources</p>
                </a>
            </div>
        </header>

        <div class="cta-section">
            <a href="CN/Guide/README.md" class="btn">开始学习</a>
        </div>

        <footer>
            <p>Built for Flipper Zero Community</p>
            <p>GitHub: <a href="https://github.com/dwgx/FlipperZeroTeacher">dwgx/FlipperZeroTeacher</a></p>
        </footer>
    </div>
</body>
</html>
